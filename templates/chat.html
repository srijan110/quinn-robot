<!DOCTYPE html>
<html>
<body>

<h3>Voice Input</h3>

<button id="btn">🎤 Start</button>
<p id="status"></p>

<p><b>Result:</b> <span id="result"></span></p>

<br>
<a class="btn" href="/">Back</a>

<hr>

<h3>Chat</h3>
<div>
    <input id="chatInput" type="text" placeholder="Type a message..." style="width:70%; padding:8px;">
    <button id="sendBtn" style="padding:8px;">Send</button>
</div>
<p><b>Chat Response:</b> <span id="chatResponse"></span></p>

<script>
    let mediaRecorder;
    let chunks = [];
    let recording = false;

    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    // Voice recording
    btn.onclick = async () => {
        if (!recording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: "audio/webm" });
                const formData = new FormData();
                formData.append("file", blob, "audio.webm");

                status.textContent = "Uploading...";

                const res = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                result.textContent = data.text || data.error;
                status.textContent = "";
            };

            mediaRecorder.start();
            recording = true;
            btn.textContent = "⏹ Stop";

        } else {
            mediaRecorder.stop();
            recording = false;
            btn.textContent = "🎤 Start";
            status.textContent = "Processing...";
        }
    };

    // Chat endpoint
    const sendBtn = document.getElementById("sendBtn");
    const chatInput = document.getElementById("chatInput");
    const chatResponse = document.getElementById("chatResponse");

    sendBtn.onclick = async () => {
        const text = chatInput.value.trim();
        if (!text) return;

        chatResponse.textContent = "Sending...";

        const res = await fetch("/api/chat-post", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        chatResponse.textContent = data.response || "OK";
        chatInput.value = "";
    };
</script>

</body>
</html>
